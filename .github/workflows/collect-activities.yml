name: 活動履歴を収集・更新する

on:
  # 毎週月曜日 00:00 UTC (09:00 JST) に自動実行
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write  # activities.md をコミット・プッシュするため
  models: read     # GitHub Models (LLM) を使用するため

jobs:
  collect-activities:
    name: アクティビティ収集
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install --quiet \
            requests \
            feedparser \
            openai

      - name: アクティビティを収集して activities.md を生成
        env:
          # GitHub Models (LLM) と GitHub API の両方に GITHUB_TOKEN を使用
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/collect_activities.py

      - name: activities.md をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activities.md
          if git diff --cached --quiet; then
            echo "変更なし: スキップします"
          else
            git commit -m "chore: 活動履歴を更新 $(date +'%Y-%m-%d')"
            git push
          fi
